  <text x="784" y="28" text-anchor="end" font-family="monospace" font-size="11"
    fill="#8b949e">3 warriors · 0 active wars</text>

  <!-- Hex cells -->
  
    <!-- @alice -->
    <g class="hex-cell" data-player="@alice">
    <polygon points="166.0,120.0 133.0,177.2 67.0,177.2 34.0,120.0 67.0,62.8 133.0,62.8"
      fill="#00ff8822"
      stroke="#00ff88"
      stroke-width="2"
      filter="url(#glow0)"
    />
    
    <text x="100" y="100" text-anchor="middle"
