      fill="#e6edf3">💎 225</text>
    <text x="345" y="142" text-anchor="middle"
      font-family="monospace" font-size="10"
      fill="#8b949e">🌿 2 acres</text>
    </g>
  

  <!-- Legend -->
  <rect x="0" y="472" width="800" height="48" fill="#1a233288"/>
  <rect x="16" y="482" width="10" height="10" fill="#00ff88" rx="2"/>
    <text x="30" y="491" font-family="monospace" font-size="9"
      fill="#8b949e">alice</text>
    <rect x="136" y="482" width="10" height="10" fill="#ff0066" rx="2"/>
    <text x="150" y="491" font-family="monospace" font-size="9"
      fill="#8b949e">charan</text>
    <rect x="256" y="482" width="10" height="10" fill="#00d4ff" rx="2"/>
    <text x="270" y="491" font-family="monospace" font-size="9"
      fill="#8b949e">bob</text>
  
  <text x="784" y="510" text-anchor="end" font-family="monospace"
    font-size="9" fill="#8b949e">GitEmpire v1.0 · 🎵 synthwave</text>
</svg>