      fill="#ff006622"
      stroke="#ff0066"
      stroke-width="2"
      filter="url(#glow1)"
    />
    
    <text x="222.5" y="160.6217782649107" text-anchor="middle"
      font-family="monospace" font-size="12" font-weight="bold"
      fill="#ff0066">@charan</text>
    <text x="222.5" y="174.6217782649107" text-anchor="middle"
