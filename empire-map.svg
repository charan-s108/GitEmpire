    <text x="222.5" y="188.6217782649107" text-anchor="middle"
      font-family="monospace" font-size="10"
      fill="#e6edf3">💎 328</text>
    <text x="222.5" y="202.6217782649107" text-anchor="middle"
      font-family="monospace" font-size="10"
      fill="#8b949e">🌿 8 acres</text>
    </g>

    <!-- @bob -->
    <g class="hex-cell" data-player="@bob">
    <polygon points="411.0,120.0 378.0,177.2 312.0,177.2 279.0,120.0 312.0,62.8 378.0,62.8"
      fill="#00d4ff22"
      stroke="#00d4ff"
      stroke-width="2"
