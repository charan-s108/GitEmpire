<svg xmlns="http://www.w3.org/2000/svg" width="800" height="520" viewBox="0 0 800 520">
  <defs>
    <filter id="glow0" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glow1" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glow2" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="warGlow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="6" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <style>
      @keyframes warPulse {
        0%   { stroke-dashoffset: 0; opacity: 1; }
        50%  { opacity: 0.6; }
        100% { stroke-dashoffset: -24; opacity: 1; }
      }
      .war-border { animation: warPulse 1.4s linear infinite; }
    </style>
  </defs>

  <!-- Background -->
  <rect width="800" height="520" fill="#0d1117"/>

  <!-- Grid -->
  <line x1="0" y1="0" x2="800" y2="0" stroke="#1a2332" stroke-width="0.5"/>
  <line x1="0" y1="52" x2="800" y2="52" stroke="#1a2332" stroke-width="0.5"/>
  <line x1="0" y1="104" x2="800" y2="104" stroke="#1a2332" stroke-width="0.5"/>
  <line x1="0" y1="156" x2="800" y2="156" stroke="#1a2332" stroke-width="0.5"/>
  <line x1="0" y1="208" x2="800" y2="208" stroke="#1a2332" stroke-width="0.5"/>
  <line x1="0" y1="260" x2="800" y2="260" stroke="#1a2332" stroke-width="0.5"/>
  <line x1="0" y1="312" x2="800" y2="312" stroke="#1a2332" stroke-width="0.5"/>
  <line x1="0" y1="364" x2="800" y2="364" stroke="#1a2332" stroke-width="0.5"/>
  <line x1="0" y1="416" x2="800" y2="416" stroke="#1a2332" stroke-width="0.5"/>
  <line x1="0" y1="468" x2="800" y2="468" stroke="#1a2332" stroke-width="0.5"/>
  <line x1="0" y1="0" x2="0" y2="520" stroke="#1a2332" stroke-width="0.5"/>
  <line x1="50" y1="0" x2="50" y2="520" stroke="#1a2332" stroke-width="0.5"/>
  <line x1="100" y1="0" x2="100" y2="520" stroke="#1a2332" stroke-width="0.5"/>
  <line x1="150" y1="0" x2="150" y2="520" stroke="#1a2332" stroke-width="0.5"/>
  <line x1="200" y1="0" x2="200" y2="520" stroke="#1a2332" stroke-width="0.5"/>
  <line x1="250" y1="0" x2="250" y2="520" stroke="#1a2332" stroke-width="0.5"/>
  <line x1="300" y1="0" x2="300" y2="520" stroke="#1a2332" stroke-width="0.5"/>
  <line x1="350" y1="0" x2="350" y2="520" stroke="#1a2332" stroke-width="0.5"/>
  <line x1="400" y1="0" x2="400" y2="520" stroke="#1a2332" stroke-width="0.5"/>
  <line x1="450" y1="0" x2="450" y2="520" stroke="#1a2332" stroke-width="0.5"/>
  <line x1="500" y1="0" x2="500" y2="520" stroke="#1a2332" stroke-width="0.5"/>
  <line x1="550" y1="0" x2="550" y2="520" stroke="#1a2332" stroke-width="0.5"/>
  <line x1="600" y1="0" x2="600" y2="520" stroke="#1a2332" stroke-width="0.5"/>
  <line x1="650" y1="0" x2="650" y2="520" stroke="#1a2332" stroke-width="0.5"/>
  <line x1="700" y1="0" x2="700" y2="520" stroke="#1a2332" stroke-width="0.5"/>
  <line x1="750" y1="0" x2="750" y2="520" stroke="#1a2332" stroke-width="0.5"/>

  <!-- Title bar -->
