<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>GitEmpire — Live Map</title>
  <style>
    :root {
      --bg:      #0d1117;
      --grid:    #1a2332;
      --accent:  #00d4ff;
      --green:   #00ff88;
      --pink:    #ff0066;
      --purple:  #7700ff;
      --orange:  #ff6600;
      --text:    #e6edf3;
      --dim:     #8b949e;
      --border:  #30363d;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Courier New', Courier, monospace;
      min-height: 100vh;
      padding: 24px 16px;
    }

    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 12px;
      margin-bottom: 28px;
      padding-bottom: 16px;
      border-bottom: 1px solid var(--border);
    }

    .logo { font-size: 1.5rem; font-weight: bold; color: var(--accent); letter-spacing: 1px; }
    .logo span { color: var(--green); }

    .meta { font-size: 0.75rem; color: var(--dim); text-align: right; }
    .meta strong { color: var(--text); }

    .refresh-btn {
      background: none;
      border: 1px solid var(--accent);
      color: var(--accent);
      font-family: inherit;
      font-size: 0.75rem;
      padding: 4px 12px;
      border-radius: 4px;
      cursor: pointer;
      transition: background 0.2s;
    }
    .refresh-btn:hover { background: var(--accent)22; }

    /* ── Layout ── */
    .grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 24px;
      max-width: 1100px;
      margin: 0 auto;
    }
    @media (min-width: 860px) { .grid { grid-template-columns: 1fr 340px; } }

    .card {
      background: var(--grid);
      border: 1px solid var(--border);
      border-radius: 8px;
      overflow: hidden;
    }

    .card-header {
      padding: 10px 16px;
      font-size: 0.7rem;
      font-weight: bold;
      color: var(--dim);
      letter-spacing: 1px;
      text-transform: uppercase;
      border-bottom: 1px solid var(--border);
    }

    .card-body { padding: 16px; }

    /* ── Map ── */
    #map-wrap { width: 100%; aspect-ratio: 800 / 520; }
    #map-wrap svg { width: 100%; height: 100%; cursor: pointer; }
    .hex-cell { cursor: pointer; transition: opacity 0.15s; }
    .hex-cell:hover { opacity: 0.85; }

    .loading-msg {
      color: var(--dim);
      font-size: 0.85rem;
      text-align: center;
      padding: 40px 0;
    }

    /* ── Tabs ── */
    .tabs {
      display: flex;
      gap: 4px;
      padding: 10px 16px 0;
      border-bottom: 1px solid var(--border);
    }
    .tab-btn {
      background: none;
      border: none;
      border-bottom: 2px solid transparent;
      color: var(--dim);
      font-family: inherit;
      font-size: 0.75rem;
      padding: 6px 12px;
      cursor: pointer;
      transition: color 0.15s, border-color 0.15s;
    }
    .tab-btn:hover { color: var(--text); }
    .tab-btn.active { color: var(--accent); border-bottom-color: var(--accent); }

    /* ── Leaderboard ── */
    table { width: 100%; border-collapse: collapse; font-size: 0.82rem; }
    th {
      color: var(--dim);
      font-size: 0.7rem;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      padding: 8px 8px;
      border-bottom: 1px solid var(--border);
      text-align: left;
    }
    td { padding: 8px 8px; border-bottom: 1px solid var(--border)88; vertical-align: middle; }
    tr:last-child td { border-bottom: none; }

    .rank { font-size: 1rem; }
    .warrior-name { color: var(--accent); font-weight: bold; }
    .gems  { color: var(--green); }
    .acres { color: var(--purple); }
    .streak { color: var(--orange); }

    .bar-wrap { background: var(--bg); border-radius: 2px; height: 4px; width: 100%; margin-top: 4px; }
    .bar { height: 4px; border-radius: 2px; background: var(--green); }

    /* ── Stats strip ── */
    .stats {
      display: flex;
      gap: 20px;
      flex-wrap: wrap;
      padding: 12px 16px;
      border-top: 1px solid var(--border);
      font-size: 0.75rem;
      color: var(--dim);
    }
    .stats b { color: var(--text); }

    /* ── Player side panel ── */
    .panel-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: #0d111799;
      z-index: 100;
      backdrop-filter: blur(2px);
    }
    .panel-overlay.open { display: block; }

    .panel {
      position: fixed;
      top: 0;
      right: 0;
      width: min(420px, 100vw);
      height: 100vh;
      background: var(--grid);
      border-left: 1px solid var(--border);
      overflow-y: auto;
      z-index: 101;
      padding: 24px 20px;
      transform: translateX(100%);
      transition: transform 0.25s ease;
    }
    .panel.open { transform: translateX(0); }

    .panel-close {
      position: absolute;
      top: 16px;
      right: 16px;
      background: none;
      border: 1px solid var(--border);
      color: var(--dim);
      font-size: 1rem;
      width: 28px;
      height: 28px;
      border-radius: 4px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .panel-close:hover { color: var(--text); border-color: var(--text); }

    .panel-name {
      font-size: 1.1rem;
      font-weight: bold;
      color: var(--accent);
      margin-bottom: 4px;
      padding-right: 36px;
    }
    .panel-badge {
      font-size: 0.8rem;
      color: var(--dim);
      margin-bottom: 20px;
    }
    .panel-badge span { color: var(--text); }

    .stat-row {
      display: flex;
      justify-content: space-between;
      padding: 6px 0;
      border-bottom: 1px solid var(--border)66;
      font-size: 0.82rem;
    }
    .stat-row:last-of-type { border-bottom: none; }
    .stat-label { color: var(--dim); }
    .stat-val   { color: var(--text); font-weight: bold; }

    .panel-section {
      margin-top: 20px;
      font-size: 0.7rem;
      color: var(--dim);
      letter-spacing: 1px;
      text-transform: uppercase;
      margin-bottom: 8px;
    }

    .pr-table { width: 100%; border-collapse: collapse; font-size: 0.76rem; margin-top: 4px; }
    .pr-table th {
      color: var(--dim);
      font-size: 0.65rem;
      padding: 4px 6px;
      border-bottom: 1px solid var(--border);
      text-align: left;
    }
    .pr-table td { padding: 5px 6px; border-bottom: 1px solid var(--border)44; }
    .pr-table tr:last-child td { border-bottom: none; }

    .badge-pill {
      display: inline-block;
      padding: 2px 8px;
      border-radius: 10px;
      font-size: 0.7rem;
      background: var(--bg);
      border: 1px solid var(--border);
      color: var(--text);
      margin-right: 4px;
      margin-bottom: 4px;
    }

    /* ── Quest panel ── */
    .quest-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 5px 0;
      border-bottom: 1px solid var(--border)44;
      font-size: 0.78rem;
    }
    .quest-row:last-child { border-bottom: none; }
    .quest-done  { color: var(--green); }
    .quest-active { color: var(--accent); }
    .quest-avail { color: var(--dim); }

    /* ── Contribution path strip ── */
    #path-strip {
      max-width: 1100px;
      margin: 0 auto 20px;
      padding: 0 4px;
    }
    .path-tier-wrap { display: flex; align-items: center; overflow-x: auto; padding-bottom: 4px; }
    .path-tier {
      text-align: center;
      padding: 4px 10px;
      border: 1px solid var(--border);
      border-radius: 6px;
      min-width: 72px;
      flex-shrink: 0;
      transition: border-color 0.2s, background 0.2s;
    }
    .path-tier.past   { border-color: var(--green); }
    .path-tier.active { border-color: var(--accent); background: #00d4ff11; }
    .path-connector { width: 28px; height: 2px; background: var(--border); flex-shrink: 0; }
    .path-connector.past { background: var(--green); }

    /* ── Badge celebration toast ── */
    .badge-toast {
      position: fixed;
      bottom: 24px;
      right: 24px;
      background: var(--grid);
      border: 1px solid var(--accent);
      border-radius: 8px;
      padding: 12px 16px;
      display: flex;
      align-items: center;
      gap: 12px;
      z-index: 200;
      transform: translateY(80px);
      opacity: 0;
      transition: transform 0.35s ease, opacity 0.35s ease;
      box-shadow: 0 0 24px #00d4ff44;
      font-size: 0.82rem;
      max-width: 260px;
    }
    .badge-toast.visible { transform: translateY(0); opacity: 1; }

    /* ── Footer ── */
    footer {
      text-align: center;
      color: var(--dim);
      font-size: 0.7rem;
      margin-top: 32px;
      padding-top: 16px;
      border-top: 1px solid var(--border);
    }
    footer a { color: var(--accent); text-decoration: none; }

    /* ── Error ── */
    .error { color: var(--pink); font-size: 0.8rem; padding: 16px; text-align: center; }

    /* live dot */
    .live-dot {
      display: inline-block;
      width: 7px; height: 7px;
      border-radius: 50%;
      background: var(--green);
      margin-right: 6px;
      animation: pulse 2s ease-in-out infinite;
      vertical-align: middle;
    }
    @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }
  </style>
</head>
<body>

<header>
  <div class="logo">⚔️ Git<span>Empire</span></div>
  <div style="display:flex;align-items:center;gap:12px;">
    <button class="refresh-btn" onclick="load()">↻ Refresh</button>
    <div class="meta">
      <span class="live-dot"></span>
      <span id="last-updated">loading…</span>
    </div>
  </div>
</header>

<!-- Contribution path strip -->
<div id="path-strip" style="display:none">
  <div style="font-size:0.65rem;color:var(--dim);letter-spacing:1px;text-transform:uppercase;margin-bottom:8px;">⚔️ Warrior Path</div>
  <div class="path-tier-wrap" id="path-steps"></div>
</div>

<div class="grid">
  <!-- Map -->
  <div class="card">
    <div class="card-header">🗺 Empire Map — click a territory to inspect</div>
    <div class="card-body" style="padding:12px;">
      <div id="map-wrap"><div class="loading-msg">Booting empire…</div></div>
    </div>
    <div class="stats" id="stats-strip"></div>
  </div>

  <!-- Leaderboard -->
  <div class="card">
    <div class="tabs">
      <button class="tab-btn active" onclick="switchTab('alltime', this)">🏆 All-time</button>
      <button class="tab-btn" onclick="switchTab('monthly', this)">🗓 Monthly</button>
      <button class="tab-btn" onclick="switchTab('weekly', this)">📅 Weekly</button>
    </div>
    <div id="leaderboard-wrap">
      <div class="loading-msg" style="padding:32px;">Loading warriors…</div>
    </div>
  </div>
</div>

<!-- Player side panel -->
<div class="panel-overlay" id="overlay" onclick="closePanel()"></div>
<div class="panel" id="player-panel">
  <button class="panel-close" onclick="closePanel()">✕</button>
  <div class="panel-name" id="panel-name"></div>
  <div class="panel-badge" id="panel-badge"></div>
  <div id="panel-stats"></div>
  <div class="panel-section" id="panel-pr-label" style="display:none">📜 Contribution History</div>
  <div id="panel-prs"></div>
  <div class="panel-section" id="panel-badge-label" style="display:none">🏅 Badge Journey</div>
  <div id="panel-badges"></div>
  <div class="panel-section" id="panel-quest-label" style="display:none">⚔️ Quest Progress</div>
  <div id="panel-quests"></div>
</div>

<footer>
  <p>🎵 <em>flow time</em> · auto-refreshes every 30s ·
    <a href="https://github.com/charan-s108/GitEmpire" target="_blank">charan-s108/GitEmpire</a>
    · GitEmpire v1.0</p>
</footer>

<script>
// ── Config ────────────────────────────────────────────────────────────────────
const REPO      = 'charan-s108/GitEmpire';
const BRANCH    = 'main';
const EMPIRE_URL = `https://raw.githubusercontent.com/${REPO}/${BRANCH}/empire.json`;

// ── Badge metadata ────────────────────────────────────────────────────────────
const BADGE_META = {
  shishya:   { label: 'Shishya',   sanskrit: 'शिष्य',    emoji: '📖', tier: 0 },
  sainik:    { label: 'Sainik',    sanskrit: 'सैनिक',    emoji: '⚔️',  tier: 1 },
  veer:      { label: 'Veer',      sanskrit: 'वीर',      emoji: '🏹',  tier: 2 },
  kshatriya: { label: 'Kshatriya', sanskrit: 'क्षत्रिय', emoji: '🛡️',  tier: 3 },
  maharathi: { label: 'Maharathi', sanskrit: 'महारथी',   emoji: '🔱',  tier: 4 },
  atirathi:  { label: 'Atirathi',  sanskrit: 'अतिरथी',   emoji: '⚡',  tier: 5 },
};

function badgeLabel(key) {
  const m = BADGE_META[key] || BADGE_META.shishya;
  return `${m.emoji} ${m.label} (${m.sanskrit})`;
}

// ── Neon palette ──────────────────────────────────────────────────────────────
const COLORS = {
  bg:      '#0d1117',
  grid:    '#1a2332',
  players: ['#00ff88','#ff0066','#00d4ff','#ffaa00','#cc44ff','#ff4444','#44ffcc','#ff8800'],
  neutral: '#7700ff',
  war:     '#ff6600',
  text:    '#e6edf3',
  accent:  '#00d4ff',
  dim:     '#8b949e',
};

// ── Quest metadata (client-side mirror) ──────────────────────────────────────
const QUEST_META = {
  first_blood:   { name: 'First Blood',      difficulty: 'Beginner' },
  land_grab:     { name: 'Land Grab',         difficulty: 'Beginner' },
  test_dharma:   { name: 'Test Dharma',       difficulty: 'Beginner' },
  bug_scout:     { name: 'Bug Scout',         difficulty: 'Beginner' },
  war_chest:     { name: 'War Chest',         difficulty: 'Intermediate' },
  veer_surge:    { name: 'Veer Surge',        difficulty: 'Intermediate' },
  karna_eye:     { name: "Karna's Eye",       difficulty: 'Advanced' },
  atirathi_path: { name: "Atirathi's Path",   difficulty: 'Legendary' },
};

const BADGE_ORDER = ['shishya','sainik','veer','kshatriya','maharathi','atirathi'];

// ── State ─────────────────────────────────────────────────────────────────────
let empireData     = null;
let currentTab     = 'alltime';
let previousBadges = {};  // { '@alice': 'sainik', ... } — for celebration detection

// ── SVG generation ────────────────────────────────────────────────────────────
function generateSVG(empire) {
  const W = 800, H = 520;
  const players = Object.entries(empire.players)
    .sort(([,a],[,b]) => b.vibe_gems - a.vibe_gems);

  const HEX_R = 70;
  const HEX_H = HEX_R * Math.sqrt(3);
  const COLS  = 4;

  function hexCenter(idx) {
    const col = idx % COLS;
    const row = Math.floor(idx / COLS);
    return {
      x: 100 + col * (HEX_R * 1.75),
      y: 120 + row * HEX_H + (col % 2 === 1 ? HEX_H / 2 : 0),
    };
  }

  function hexPoints(cx, cy, r) {
    return Array.from({length:6},(_,i) => {
      const a = (Math.PI/180)*(60*i);
      return `${(cx+r*Math.cos(a)).toFixed(1)},${(cy+r*Math.sin(a)).toFixed(1)}`;
    }).join(' ');
  }

  const activeWars = new Set(
    (empire.wars||[]).filter(w=>w.status==='active').flatMap(w=>[w.attacker,w.defender])
  );

  const defs = players.map((_,i) => {
    const c = COLORS.players[i%COLORS.players.length];
    return `<filter id="glow${i}" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>`;
  }).join('');

  const warFilterDef = `<filter id="warGlow" x="-40%" y="-40%" width="180%" height="180%">
    <feGaussianBlur in="SourceGraphic" stdDeviation="6" result="blur"/>
    <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
  </filter>`;

  const hexCells = players.map(([name, player], i) => {
    const color = COLORS.players[i%COLORS.players.length];
    const {x, y} = hexCenter(i);
    const pts = hexPoints(x, y, HEX_R - 4);
    const isAtWar = activeWars.has(name);
    const displayName = name.replace(/^@/,'');
    const shortName = displayName.length > 8 ? displayName.slice(0,7)+'…' : displayName;
    const badgeEmoji = (BADGE_META[player.badge] || BADGE_META.shishya).emoji;
    const badgeKey   = player.badge || 'shishya';

    const warStroke = isAtWar
      ? `<polygon points="${pts}" fill="none" stroke="${COLORS.war}" stroke-width="3"
           stroke-dasharray="8 4" filter="url(#warGlow)" class="war-border"/>`
      : '';

    return `<g class="hex-cell" data-player="${name}" style="cursor:pointer">
      <polygon points="${pts}" fill="${color}22" stroke="${color}" stroke-width="2" filter="url(#glow${i})"/>
      ${warStroke}
      <text x="${x}" y="${y-22}" text-anchor="middle" font-family="monospace" font-size="12" font-weight="bold" fill="${color}">@${shortName}</text>
      <text x="${x}" y="${y-7}"  text-anchor="middle" font-family="monospace" font-size="10" fill="${COLORS.dim}">${badgeEmoji} ${badgeKey}</text>
      <text x="${x}" y="${y+8}"  text-anchor="middle" font-family="monospace" font-size="10" fill="${COLORS.text}">💎 ${player.vibe_gems}</text>
      <text x="${x}" y="${y+22}" text-anchor="middle" font-family="monospace" font-size="10" fill="${COLORS.dim}">🌿 ${player.acres} acres</text>
    </g>`;
  }).join('');

  const emptyHex = players.length === 0 ? `
    <polygon points="${hexPoints(W/2,H/2-30,HEX_R)}" fill="${COLORS.neutral}22" stroke="${COLORS.neutral}" stroke-width="1.5"/>
    <text x="${W/2}" y="${H/2-20}" text-anchor="middle" font-family="monospace" font-size="13" fill="${COLORS.neutral}">no warriors yet</text>
    <text x="${W/2}" y="${H/2-4}"  text-anchor="middle" font-family="monospace" font-size="11" fill="${COLORS.dim}">/vibe-join @you</text>` : '';

  const legendItems = Math.min(players.length, 4);
  const legendRows = Array.from({length:legendItems},(_,i)=>{
    const [name] = players[i];
    const color = COLORS.players[i%COLORS.players.length];
    return `<rect x="${16+i*120}" y="${H-38}" width="10" height="10" fill="${color}" rx="2"/>
    <text x="${30+i*120}" y="${H-29}" font-family="monospace" font-size="9" fill="${COLORS.dim}">${name.replace(/^@/,'').slice(0,9)}</text>`;
  }).join('');

  const warLegend = empire.wars?.some(w=>w.status==='active')
    ? `<rect x="${W-140}" y="${H-38}" width="10" height="10" fill="${COLORS.war}" rx="2"/>
       <text x="${W-126}" y="${H-29}" font-family="monospace" font-size="9" fill="${COLORS.dim}">active war</text>`
    : '';

  const gridLines =
    Array.from({length:10},(_,i)=>`<line x1="0" y1="${52*i}" x2="${W}" y2="${52*i}" stroke="${COLORS.grid}" stroke-width="0.5"/>`).join('') +
    Array.from({length:16},(_,i)=>`<line x1="${50*i}" y1="0" x2="${50*i}" y2="${H}" stroke="${COLORS.grid}" stroke-width="0.5"/>`).join('');

  const wc = players.length;
  const ac = (empire.wars||[]).filter(w=>w.status==='active').length;

  return `<svg xmlns="http://www.w3.org/2000/svg" width="${W}" height="${H}" viewBox="0 0 ${W} ${H}" id="empire-svg">
  <defs>
    ${defs}${warFilterDef}
    <style>
      @keyframes warPulse { 0%{stroke-dashoffset:0;opacity:1}50%{opacity:.6}100%{stroke-dashoffset:-24;opacity:1} }
      .war-border{animation:warPulse 1.4s linear infinite}
    </style>
  </defs>
  <rect width="${W}" height="${H}" fill="${COLORS.bg}"/>
  ${gridLines}
  <rect x="0" y="0" width="${W}" height="44" fill="${COLORS.grid}"/>
  <text x="16" y="28" font-family="monospace" font-size="16" font-weight="bold" fill="${COLORS.accent}">⚔️  GitEmpire</text>
  <text x="${W-16}" y="28" text-anchor="end" font-family="monospace" font-size="11" fill="${COLORS.dim}">${wc} warrior${wc!==1?'s':''} · ${ac} active war${ac!==1?'s':''}</text>
  ${hexCells}${emptyHex}
  <rect x="0" y="${H-48}" width="${W}" height="48" fill="${COLORS.grid}88"/>
  ${legendRows}${warLegend}
  <text x="${W-16}" y="${H-10}" text-anchor="end" font-family="monospace" font-size="9" fill="${COLORS.dim}">GitEmpire v1.0 · 🎵 synthwave</text>
</svg>`;
}

// ── Leaderboard ───────────────────────────────────────────────────────────────
function renderLeaderboard(empire, tab) {
  const field = tab === 'weekly' ? 'weekly_gems' : tab === 'monthly' ? 'monthly_gems' : 'vibe_gems';
  const players = Object.entries(empire.players)
    .sort(([,a],[,b]) => (b[field]||0) - (a[field]||0) || b.acres - a.acres)
    .slice(0, 10);

  if (players.length === 0) {
    return `<div class="loading-msg" style="padding:32px;">No warriors yet.<br><code>/vibe-join @you</code></div>`;
  }

  const medals = ['🥇','🥈','🥉','4️⃣','5️⃣','6️⃣','7️⃣','8️⃣','9️⃣','🔟'];
  const maxGems = players[0][1][field] || 1;

  const rows = players.map(([name, p], i) => {
    const gems = p[field] || 0;
    const pct  = Math.round((gems / maxGems) * 100);
    const badge = (BADGE_META[p.badge] || BADGE_META.shishya).emoji;
    const streak = p.streak > 1 ? `<span class="streak">🔥${p.streak}</span>` : '—';
    return `<tr>
      <td class="rank">${medals[i]}</td>
      <td>
        <span class="warrior-name">${badge} ${name}</span>
        <div class="bar-wrap"><div class="bar" style="width:${pct}%"></div></div>
      </td>
      <td class="gems">💎 ${gems}</td>
      <td class="acres">🌿 ${p.acres}</td>
      <td>${streak}</td>
    </tr>`;
  }).join('');

  return `<table>
    <thead><tr><th>#</th><th>Warrior</th><th>Gems</th><th>Acres</th><th>Streak</th></tr></thead>
    <tbody>${rows}</tbody>
  </table>`;
}

// ── Tab switch ────────────────────────────────────────────────────────────────
function switchTab(tab, btn) {
  currentTab = tab;
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  if (empireData) {
    document.getElementById('leaderboard-wrap').innerHTML = renderLeaderboard(empireData, tab);
  }
}

// ── Contribution path strip ──────────────────────────────────────────────────
function renderPathStrip(highlightBadge) {
  const strip = document.getElementById('path-strip');
  const steps = document.getElementById('path-steps');
  if (!strip || !steps) return;

  const hlTier = (BADGE_META[highlightBadge] || BADGE_META.shishya).tier;

  const html = BADGE_ORDER.map((key, i) => {
    const m    = BADGE_META[key];
    const past = m.tier < hlTier;
    const active = key === highlightBadge;
    const tierClass = past ? 'past' : active ? 'active' : '';
    const labelColor = past ? 'var(--green)' : active ? 'var(--accent)' : 'var(--dim)';
    const connector = i < BADGE_ORDER.length - 1
      ? `<div class="path-connector${past || (active && i < hlTier) ? ' past' : ''}"></div>`
      : '';
    return `<div style="display:flex;align-items:center;flex-shrink:0">
      <div class="path-tier ${tierClass}">
        <div style="font-size:1rem">${m.emoji}</div>
        <div style="font-size:0.62rem;color:${labelColor};font-weight:${active?'bold':'normal'}">${m.label}</div>
        <div style="font-size:0.52rem;color:var(--dim)">${m.sanskrit}</div>
      </div>${connector}</div>`;
  }).join('');

  steps.innerHTML = html;
  strip.style.display = 'block';
}

// ── Badge celebration toast ───────────────────────────────────────────────────
function showBadgeCelebration(playerName, newBadge) {
  const m = BADGE_META[newBadge] || BADGE_META.shishya;
  const toast = document.createElement('div');
  toast.className = 'badge-toast';
  toast.innerHTML = `<span style="font-size:1.6rem">${m.emoji}</span>
    <div>
      <div style="font-weight:bold;color:var(--accent)">${playerName}</div>
      <div style="font-size:0.72rem;color:var(--green)">Promoted to ${m.label}!</div>
      <div style="font-size:0.68rem;color:var(--dim)">${m.sanskrit}</div>
    </div>`;
  document.body.appendChild(toast);
  requestAnimationFrame(() => { toast.classList.add('visible'); });
  setTimeout(() => {
    toast.classList.remove('visible');
    setTimeout(() => toast.remove(), 400);
  }, 4500);
}

// ── Player panel ──────────────────────────────────────────────────────────────
function openPanel(playerName) {
  if (!empireData) return;
  const p = empireData.players[playerName];
  if (!p) return;

  const ranked = Object.entries(empireData.players)
    .sort(([,a],[,b]) => b.vibe_gems - a.vibe_gems)
    .findIndex(([n]) => n === playerName) + 1;

  const badge = BADGE_META[p.badge] || BADGE_META.shishya;

  document.getElementById('panel-name').textContent = playerName;
  document.getElementById('panel-badge').innerHTML =
    `Badge: <span>${badge.emoji} ${badge.label} (${badge.sanskrit})</span>`;

  document.getElementById('panel-stats').innerHTML = `
    <div class="stat-row"><span class="stat-label">💎 Total gems</span><span class="stat-val">${p.vibe_gems}</span></div>
    <div class="stat-row"><span class="stat-label">📅 Weekly gems</span><span class="stat-val">${p.weekly_gems||0}</span></div>
    <div class="stat-row"><span class="stat-label">🗓 Monthly gems</span><span class="stat-val">${p.monthly_gems||0}</span></div>
    <div class="stat-row"><span class="stat-label">🌿 Glow-acres</span><span class="stat-val">${p.acres}</span></div>
    <div class="stat-row"><span class="stat-label">📦 PRs merged</span><span class="stat-val">${p.prs_merged||0}</span></div>
    <div class="stat-row"><span class="stat-label">🐛 Bugs found</span><span class="stat-val">${p.bugs_found||0}</span></div>
    <div class="stat-row"><span class="stat-label">🔴 Critical bugs</span><span class="stat-val">${p.critical_bugs_found||0}</span></div>
    <div class="stat-row"><span class="stat-label">🔥 Streak</span><span class="stat-val">${p.streak}</span></div>
    <div class="stat-row"><span class="stat-label">⚔️ Wars won</span><span class="stat-val">${p.wars_won}</span></div>
    <div class="stat-row"><span class="stat-label">🌐 Rank</span><span class="stat-val">#${ranked}</span></div>
    <div class="stat-row"><span class="stat-label">📅 Joined</span><span class="stat-val">${new Date(p.joined).toLocaleDateString()}</span></div>
  `;

  // PR history
  const prLabel = document.getElementById('panel-pr-label');
  const prWrap  = document.getElementById('panel-prs');
  if (p.plots && p.plots.length > 0) {
    prLabel.style.display = 'block';
    const rows = p.plots.slice().reverse().map(pl => `<tr>
      <td>#${pl.pr}</td>
      <td class="gems">+${pl.gems_earned}</td>
      <td class="acres">+${pl.acres} ac</td>
      <td>${pl.lines_changed} lines</td>
      <td>${pl.has_tests ? '✓' : '✗'}</td>
    </tr>`).join('');
    prWrap.innerHTML = `<table class="pr-table">
      <thead><tr><th>PR</th><th>Gems</th><th>Acres</th><th>Lines</th><th>Tests</th></tr></thead>
      <tbody>${rows}</tbody>
    </table>`;
  } else {
    prLabel.style.display = 'none';
    prWrap.innerHTML = '';
  }

  // Badge history
  const badgeLabel = document.getElementById('panel-badge-label');
  const badgeWrap  = document.getElementById('panel-badges');
  if (p.badge_history && p.badge_history.length > 0) {
    badgeLabel.style.display = 'block';
    badgeWrap.innerHTML = p.badge_history.map(bh => {
      const m = BADGE_META[bh.badge] || BADGE_META.shishya;
      return `<span class="badge-pill">${m.emoji} ${m.label}</span>`;
    }).join('');
  } else {
    badgeLabel.style.display = 'none';
    badgeWrap.innerHTML = '';
  }

  // Quest progress
  const questLabel2 = document.getElementById('panel-quest-label');
  const questWrap   = document.getElementById('panel-quests');
  const qp = p.quest_progress || {};
  const questIds = Object.keys(qp);
  if (questIds.length > 0) {
    questLabel2.style.display = 'block';
    questWrap.innerHTML = questIds.map(id => {
      const q    = QUEST_META[id];
      const done = qp[id]?.status === 'completed';
      const cls  = done ? 'quest-done' : 'quest-active';
      const icon = done ? '✓' : '◌';
      return `<div class="quest-row">
        <span class="${cls}">${icon} ${q ? q.name : id}</span>
        <span style="color:var(--dim);font-size:0.7rem">${done ? 'done' : 'active'}</span>
      </div>`;
    }).join('');
  } else {
    questLabel2.style.display = 'none';
    questWrap.innerHTML = '';
  }

  // Contribution path strip
  renderPathStrip(p.badge || 'shishya');

  document.getElementById('overlay').classList.add('open');
  document.getElementById('player-panel').classList.add('open');
}

function closePanel() {
  document.getElementById('overlay').classList.remove('open');
  document.getElementById('player-panel').classList.remove('open');
}

document.addEventListener('keydown', e => { if (e.key === 'Escape') closePanel(); });

// ── Load & render ─────────────────────────────────────────────────────────────
async function load() {
  document.getElementById('last-updated').textContent = 'refreshing…';
  try {
    const res = await fetch(`${EMPIRE_URL}?_=${Date.now()}`);
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    const newData = await res.json();

    // Badge celebration — detect upgrades vs previous load
    const newBadges = {};
    for (const [name, p] of Object.entries(newData.players || {})) {
      newBadges[name] = p.badge;
      if (previousBadges[name] && previousBadges[name] !== p.badge) {
        showBadgeCelebration(name, p.badge);
      }
    }
    previousBadges = newBadges;

    empireData = newData;

    // Map
    const mapWrap = document.getElementById('map-wrap');
    mapWrap.innerHTML = generateSVG(empireData);

    // Click handler via delegation
    const svg = document.getElementById('empire-svg');
    if (svg) {
      svg.addEventListener('click', e => {
        const cell = e.target.closest('.hex-cell');
        if (cell) openPanel(cell.dataset.player);
      });
    }

    // Leaderboard
    document.getElementById('leaderboard-wrap').innerHTML = renderLeaderboard(empireData, currentTab);

    // Stats strip
    const totalWars  = (empireData.wars||[]).filter(w=>w.status==='active').length;
    const totalGems  = Object.values(empireData.players).reduce((s,p)=>s+p.vibe_gems,0);
    const totalAcres = Object.values(empireData.players).reduce((s,p)=>s+p.acres,0);
    document.getElementById('stats-strip').innerHTML =
      `<span>👥 <b>${Object.keys(empireData.players).length}</b> warriors</span>
       <span>⚔️ <b>${totalWars}</b> active wars</span>
       <span>💎 <b>${totalGems}</b> total gems</span>
       <span>🌿 <b>${totalAcres}</b> total acres</span>`;

    const ts = empireData.meta?.last_updated
      ? new Date(empireData.meta.last_updated).toLocaleTimeString()
      : 'unknown';
    document.getElementById('last-updated').textContent = `updated ${ts}`;

  } catch (err) {
    document.getElementById('map-wrap').innerHTML =
      `<div class="error">Failed to load empire.json<br><small>${err.message}</small></div>`;
    document.getElementById('last-updated').textContent = 'error';
    console.error(err);
  }
}

load();
setInterval(load, 30_000);
</script>
